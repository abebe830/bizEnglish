<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BizEnglish — ビジネス英語学習アプリ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#2563EB;--pri-l:#DBEAFE;
  --pur:#7C3AED;--pur-l:#EDE9FE;
  --acc:#F59E0B;--acc-l:#FEF3C7;
  --ok:#10B981;--ok-l:#D1FAE5;
  --ng:#EF4444;--ng-l:#FEE2E2;
  --bg:#F8FAFF;--card:#FFFFFF;--text:#1E293B;--muted:#64748B;--bdr:#E2E8F0;
  --tab-h:64px;--hdr-h:60px;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative}

/* ── HEADER ── */
.hdr{height:var(--hdr-h);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-title{font-family:'Baloo 2',sans-serif;font-size:18px;font-weight:700;color:#FFF;letter-spacing:.3px}
.hdr-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--acc);color:#78350F}

/* ── SCREENS ── */
.screen{display:none;flex:1;padding:1rem;padding-bottom:calc(var(--tab-h)+1rem);animation:fadeUp .25s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.8}70%{transform:scale(1.35);opacity:0}100%{transform:scale(1.35);opacity:0}}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes waveBar{0%,100%{height:6px}50%{height:22px}}
@keyframes starPop{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* ── TAB BAR ── */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--tab-h);background:var(--card);border-top:1px solid var(--bdr);display:flex;z-index:200}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .2s;border:none;background:none;padding:6px 0}
.tab-item .t-ico{font-size:22px;color:var(--muted);transition:all .2s;line-height:1}
.tab-item .t-lbl{font-size:10px;font-weight:700;color:var(--muted);transition:all .2s;letter-spacing:.3px}
.tab-item.active .t-ico,.tab-item.active .t-lbl{color:var(--pri)}
#tab-vocab.active .t-ico,#tab-vocab.active .t-lbl{color:var(--pri)}
#tab-listen.active .t-ico,#tab-listen.active .t-lbl{color:var(--pri)}
#tab-shadow.active .t-ico,#tab-shadow.active .t-lbl{color:var(--pur)}
.tab-item.active .t-ico{transform:scale(1.15)}
.tab-indicator{position:absolute;top:-2px;height:3px;border-radius:0 0 3px 3px;width:33.33%;transition:left .3s cubic-bezier(.4,0,.2,1)}

/* ── COMMON CARDS ── */
.sec-title{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
.prog-wrap{background:var(--card);border-radius:14px;border:1px solid var(--bdr);padding:12px 16px;margin-bottom:1rem}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:13px;font-weight:700}
.prog-score{font-size:13px;font-weight:700;color:var(--muted)}
.prog-bar{height:8px;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.q-card{background:var(--card);border-radius:18px;border:1px solid var(--bdr);padding:20px 18px;margin-bottom:1rem}
.q-counter{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.choice-btn{background:var(--bg);border:2px solid var(--bdr);border-radius:12px;padding:14px 10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:center;line-height:1.35}
.choice-btn:hover:not(:disabled){border-color:var(--pri);background:var(--pri-l);color:var(--pri);transform:scale(1.02)}
.choice-btn.correct{background:var(--ok-l);border-color:var(--ok);color:#065F46;transform:scale(1.03)}
.choice-btn.wrong{background:var(--ng-l);border-color:var(--ng);color:#991B1B;animation:shake .35s ease}
.feedback{border-radius:14px;padding:14px 16px;font-size:14px;font-weight:700;text-align:center;margin-bottom:1rem;animation:popIn .3s cubic-bezier(.4,0,.2,1);display:none}
.feedback.ok-fb{background:var(--ok-l);color:#065F46;border:1.5px solid #34D399}
.feedback.ng-fb{background:var(--ng-l);color:#991B1B;border:1.5px solid #FCA5A5}
.next-btn{width:100%;padding:15px;color:#FFF;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;display:none}
.next-btn:hover{filter:brightness(1.1);transform:scale(1.01)}
/* ── RESULT / CLEAR ── */
.stars-row{display:flex;justify-content:center;gap:8px;margin-bottom:16px}
.star{font-size:28px;animation:starPop .4s ease both}
.star:nth-child(1){animation-delay:.1s}.star:nth-child(2){animation-delay:.25s}.star:nth-child(3){animation-delay:.4s}
.clear-modal{position:fixed;inset:0;background:rgba(30,41,59,.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fadeUp .25s ease}
.clear-card{background:var(--card);border-radius:24px;padding:32px 24px 24px;text-align:center;max-width:340px;width:100%;animation:popIn .35s cubic-bezier(.4,0,.2,1)}
.clear-emoji{font-size:52px;margin-bottom:12px;display:block}
.clear-title{font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px}
.clear-msg{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.clear-stats{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-pill{background:var(--pri-l);color:var(--pri);font-size:13px;font-weight:700;padding:6px 14px;border-radius:99px}
.nxt-lvl-btn{width:100%;padding:14px;color:#FFF;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s}
/* ── RESULT SCREEN ── */
.result-screen{text-align:center;padding:2rem 1rem}
.result-emoji{font-size:64px;margin-bottom:12px;display:block;animation:popIn .4s ease}
.result-title{font-family:'Baloo 2',sans-serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px}
.result-msg{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.7}
.result-stat{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:800;padding:10px 20px;border-radius:999px;margin-bottom:24px}
.restart-btn{display:block;width:100%;padding:15px;color:#FFF;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s}

/* ── VOCAB ── */
#hdr-vocab{background:var(--pri)}
#screen-vocab .prog-lbl{color:var(--pri)}
#screen-vocab .prog-bar{background:var(--pri-l)}
#screen-vocab .prog-fill{background:var(--pri)}
#screen-vocab .q-word{font-family:'Baloo 2',sans-serif;font-size:34px;font-weight:700;color:var(--pri);text-align:center;padding:16px 0 8px}
#screen-vocab .q-hint{font-size:13px;color:var(--muted);text-align:center;padding-bottom:4px}
#screen-vocab .next-btn{background:var(--pri)}
#vocab-clear-btn{background:var(--pri)}
#vocab-nxt-lvl{background:var(--pri)}

/* ── LISTEN ── */
#hdr-listen{background:var(--pri)}
#screen-listen .prog-lbl{color:var(--pri)}
#screen-listen .prog-bar{background:var(--pri-l)}
#screen-listen .prog-fill{background:var(--pri)}
#screen-listen .jp-phrase{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4}
#screen-listen .sub-hint{font-size:13px;color:var(--muted);margin-bottom:18px}
.speak-btn{display:inline-flex;align-items:center;gap:8px;background:var(--pri);color:#FFF;border:none;border-radius:50px;padding:12px 24px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:4px}
.speak-btn:hover{background:#1D4ED8;transform:scale(1.03)}
.speak-btn.playing{background:#0891B2}
.replay-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--bdr);border-radius:50px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.replay-btn:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}
.listen-choices{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:1rem}
.listen-choice{background:var(--bg);border:2px solid var(--bdr);border-radius:12px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:left;line-height:1.5}
.listen-choice:hover:not(:disabled){border-color:var(--pri);background:var(--pri-l);color:var(--pri);transform:translateX(3px)}
.listen-choice.correct{background:var(--ok-l);border-color:var(--ok);color:#065F46;transform:translateX(4px)}
.listen-choice.wrong{background:var(--ng-l);border-color:var(--ng);color:#991B1B;animation:shake .35s ease}
.c-alpha{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--bdr);color:var(--muted);font-size:12px;font-weight:800;text-align:center;line-height:22px;margin-right:8px}
.listen-choice.correct .c-alpha{background:var(--ok);color:#FFF}
.listen-choice.wrong .c-alpha{background:var(--ng);color:#FFF}
#screen-listen .next-btn{background:var(--pri)}
#screen-listen .result-stat{background:var(--pri-l);color:var(--pri)}
#screen-listen .restart-btn{background:var(--pri)}

/* ── SHADOW ── */
#hdr-shadow{background:var(--pur)}
#screen-shadow .prog-lbl{color:var(--pur)}
#screen-shadow .prog-bar{background:var(--pur-l)}
#screen-shadow .prog-fill{background:var(--pur)}
#screen-shadow .en-phrase{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:700;color:var(--pur);line-height:1.4;margin-bottom:6px}
#screen-shadow .jp-label{font-size:14px;color:var(--muted);margin-bottom:18px}
.play-btn{display:inline-flex;align-items:center;gap:7px;background:var(--pri);color:#FFF;border:none;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s}
.play-btn:hover{background:#1D4ED8;transform:scale(1.03)}
.play-btn.playing{background:#0891B2}
.slow-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:50px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
.slow-btn:hover,.slow-btn.active{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}
.mic-area{text-align:center;margin-bottom:1rem;padding:8px 0}
.mic-outer{position:relative;display:inline-flex;align-items:center;justify-content:center;width:88px;height:88px;margin-bottom:12px}
.mic-ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--pur);opacity:0}
.mic-ring.active{animation:pulseRing 1.2s ease-out infinite}
.mic-core{width:72px;height:72px;border-radius:50%;background:var(--pur);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:none;position:relative;z-index:1}
.mic-core:hover{background:#6D28D9;transform:scale(1.05)}
.mic-core.recording{background:#DC2626;animation:micPulse .6s ease infinite}
.mic-ico{font-size:30px;color:#FFF;line-height:1}
.mic-lbl{font-size:13px;font-weight:700;color:var(--muted);display:block}
.mic-lbl.recording{color:#DC2626}
.wave-bars{display:flex;align-items:center;justify-content:center;gap:4px;height:28px;margin:8px 0}
.wave-bar{width:4px;height:6px;background:var(--pur);border-radius:99px;opacity:.4}
.wave-bar.active{opacity:1;animation:waveBar .5s ease infinite}
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.1s}
.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.1s}
.wave-bar:nth-child(5){animation-delay:0s}
.transcript-box{background:var(--pur-l);border:1.5px solid #C4B5FD;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:700;color:#4C1D95;text-align:center;margin-bottom:.75rem;display:none}
.shadow-result{border-radius:14px;padding:14px 16px;font-size:14px;font-weight:700;text-align:center;margin-bottom:1rem;animation:popIn .3s cubic-bezier(.4,0,.2,1);display:none}
.shadow-result.perfect{background:var(--ok-l);color:#065F46;border:1.5px solid #34D399;font-size:16px}
.shadow-result.good{background:var(--pri-l);color:#1E3A8A;border:1.5px solid #93C5FD}
.shadow-result.try{background:var(--ng-l);color:#991B1B;border:1.5px solid #FCA5A5}
.match-detail{font-size:12px;font-weight:600;opacity:.8;margin-top:4px}
.action-row{display:flex;gap:10px;margin-bottom:.5rem}
.retry-btn{flex:1;padding:13px;background:var(--bg);color:var(--pur);border:2px solid var(--pur);border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:var(--pur-l)}
.shadow-next-btn{flex:1;padding:13px;background:var(--pur);color:#FFF;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
.shadow-next-btn:hover{background:#6D28D9}
#screen-shadow .result-stat{background:var(--pur-l);color:var(--pur)}
#screen-shadow .restart-btn{background:var(--pur)}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">

  <!-- ========== HEADER ========== -->
  <div class="hdr" id="hdr-vocab">
    <span class="hdr-title">🌟 BizEnglish</span>
    <span class="hdr-badge" id="vocab-badge">LEVEL 1</span>
  </div>

  <!-- ========== SCREEN: VOCAB ========== -->
  <div class="screen active" id="screen-vocab">
    <p class="sec-title">英単語クイズ</p>
    <p class="sec-sub">ビジネス英語を身につけよう！</p>
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="v-lv-text">Level 1 — ビジネス初級</span>
        <span class="prog-score" id="v-score">0 / 10</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="v-fill" style="width:0%"></div></div>
    </div>
    <div class="q-card" id="v-card">
      <div class="q-counter" id="v-counter">QUESTION 1 OF 10</div>
      <div class="q-word" id="v-word">meeting</div>
      <div class="q-hint" id="v-hint">この単語の意味は？</div>
    </div>
    <div class="choices-grid" id="v-choices"></div>
    <div class="feedback" id="v-feedback"></div>
    <button class="next-btn" id="v-next" style="background:var(--pri)">次の問題へ →</button>
  </div>

  <!-- ========== SCREEN: LISTEN ========== -->
  <div class="screen" id="screen-listen">
    <p class="sec-title">リスニング</p>
    <p class="sec-sub">音声を聞いて正しい英文を選ぼう！</p>
    <div id="l-body"></div>
  </div>

  <!-- ========== SCREEN: SHADOW ========== -->
  <div class="screen" id="screen-shadow">
    <p class="sec-title">シャドーイング</p>
    <p class="sec-sub">お手本を聞いて、マイクに向かって発音しよう！</p>
    <div id="s-body"></div>
  </div>

  <!-- ========== TAB BAR ========== -->
  <nav class="tab-bar">
    <div class="tab-indicator" id="tab-ind" style="left:0;background:var(--pri)"></div>
    <button class="tab-item active" id="tab-vocab" onclick="switchTab('vocab')">
      <i class="ti ti-books t-ico" aria-hidden="true"></i>
      <span class="t-lbl">英単語</span>
    </button>
    <button class="tab-item" id="tab-listen" onclick="switchTab('listen')">
      <i class="ti ti-headphones t-ico" aria-hidden="true"></i>
      <span class="t-lbl">リスニング</span>
    </button>
    <button class="tab-item" id="tab-shadow" onclick="switchTab('shadow')">
      <i class="ti ti-microphone t-ico" aria-hidden="true"></i>
      <span class="t-lbl">シャドーイング</span>
    </button>
  </nav>
</div>

<!-- ========== VOCAB CLEAR MODAL ========== -->
<div class="clear-modal" id="vocab-clear" style="display:none">
  <div class="clear-card">
    <span class="clear-emoji" id="vc-emoji">🎉</span>
    <div class="stars-row"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div>
    <p class="clear-title" id="vc-title">Level 1 クリア！</p>
    <p class="clear-msg" id="vc-msg">素晴らしい！</p>
    <div class="clear-stats">
      <span class="stat-pill" id="vc-score-pill">正解 10/10</span>
      <span class="stat-pill" id="vc-lv-pill">LEVEL 1</span>
    </div>
    <button class="nxt-lvl-btn" id="vocab-nxt-lvl" style="background:var(--pri)" onclick="vocabNextLevel()">次のレベルへ 🚀</button>
  </div>
</div>

<script>
/* ============================================================
   SHARED UTILITIES
   ============================================================ */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

let speechVoices=[];
function loadVoices(){
  if(!window.speechSynthesis)return;
  speechVoices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(!speechVoices.length)speechSynthesis.addEventListener('voiceschanged',()=>{speechVoices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));});
}
function speak(text,rate,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate||0.85;u.pitch=1;
  const v=speechVoices.find(x=>x.lang==='en-US'&&x.name.includes('Google'))||speechVoices.find(x=>x.lang==='en-US')||speechVoices[0];
  if(v)u.voice=v;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#2563EB','#F59E0B','#10B981','#EF4444','#7C3AED','#EC4899','#06B6D4'];
  const p=Array.from({length:130},()=>({x:Math.random()*canvas.width,y:-10-Math.random()*200,size:6+Math.random()*8,color:rand(colors),speed:3+Math.random()*4,angle:Math.random()*360,spin:(Math.random()-.5)*6,drift:(Math.random()-.5)*2,opacity:1,shape:Math.random()>.5?'rect':'circle'}));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    p.forEach(q=>{ctx.save();ctx.globalAlpha=q.opacity;ctx.translate(q.x,q.y);ctx.rotate(q.angle*Math.PI/180);ctx.fillStyle=q.color;if(q.shape==='rect')ctx.fillRect(-q.size/2,-q.size/4,q.size,q.size/2);else{ctx.beginPath();ctx.arc(0,0,q.size/2,0,Math.PI*2);ctx.fill();}ctx.restore();q.y+=q.speed;q.x+=q.drift;q.angle+=q.spin;if(f>80)q.opacity-=0.012;});
    f++;if(f<160)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

/* ── TAB SWITCHING ── */
const HDR_COLORS={vocab:'var(--pri)',listen:'var(--pri)',shadow:'var(--pur)'};
const IND_COLORS={vocab:'var(--pri)',listen:'var(--pri)',shadow:'var(--pur)'};
function switchTab(tab){
  ['vocab','listen','shadow'].forEach((t,i)=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('screen-'+t).classList.toggle('active',t===tab);
    document.getElementById('hdr-'+t)&&(document.getElementById('hdr-'+t).style.display=t===tab?'flex':'none');
  });
  const idx={'vocab':0,'listen':1,'shadow':2}[tab];
  document.getElementById('tab-ind').style.left=idx*33.33+'%';
  document.getElementById('tab-ind').style.background=IND_COLORS[tab];
  // show correct header
  document.getElementById('hdr-vocab').style.display=tab==='vocab'?'flex':'none';
  document.getElementById('hdr-listen').style.display=tab==='listen'?'flex':'none';
  document.getElementById('hdr-shadow').style.display=tab==='shadow'?'flex':'none';
}

/* set up extra headers for listen/shadow */
(function(){
  const hl=document.createElement('div');
  hl.className='hdr';hl.id='hdr-listen';hl.style.cssText='background:var(--pri);display:none';
  hl.innerHTML='<span class="hdr-title">🎧 リスニング</span><span class="hdr-badge" id="listen-badge">LEVEL 1</span>';
  document.getElementById('app').insertBefore(hl,document.getElementById('screen-vocab'));
  const hs=document.createElement('div');
  hs.className='hdr';hs.id='hdr-shadow';hs.style.cssText='background:var(--pur);display:none';
  hs.innerHTML='<span class="hdr-title">🗣️ シャドーイング</span><span class="hdr-badge" id="shadow-badge">LEVEL 1</span>';
  document.getElementById('app').insertBefore(hs,document.getElementById('screen-vocab'));
})();

const PRAISE=["🎉 Brilliant! You nailed it!","🌟 Outstanding! You're on fire!","🏆 Excellent! Keep it up!","💪 Fantastic! You're a star!","🚀 Amazing! You're unstoppable!","✨ Perfect! You're a genius!","🎯 Spot on! Incredible work!","🥳 Wonderful! You blew my mind!","🔥 Superb! You're crushing it!","👑 Magnificent! Truly impressive!"];
const CLEAR_MSGS=["完璧です！あなたはビジネス英語の天才かもしれません！","素晴らしい！全問クリアで次のレベルへ進む資格十分です！","脅威の正解率！この調子でどんどん上を目指しましょう！","もはや敵なし！次のステージもあなたなら余裕です！","圧巻のパフォーマンス！語彙力が爆上がりしています！"];
const LEVEL_NAMES=["ビジネス初級","ビジネス中級","ビジネス上級","エキスパート","マスター","レジェンド"];
const PER_LEVEL=10;

let vShuffled=[],vLvl=1,vIdx=0,vScore=0,vAnswered=false;

function vShuffle(){vShuffled=shuffle(VOCAB_ALL);}
function vGetQ(){return vShuffled[(((vLvl-1)*PER_LEVEL)+vIdx)%vShuffled.length];}
function vLvlName(){return LEVEL_NAMES[Math.min(Math.floor((vLvl-1)/3),LEVEL_NAMES.length-1)];}

function vShuffleChoices(q){
  const items=q.c.map((text,i)=>({text,isCorrect:i===q.a}));
  for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
  return items;
}

function vocabRender(){
  vAnswered=false;
  const q=vGetQ();
  const total=PER_LEVEL;
  document.getElementById('vocab-badge').textContent='LEVEL '+vLvl;
  document.getElementById('v-lv-text').textContent='Level '+vLvl+' — '+vLvlName();
  document.getElementById('v-score').textContent=vScore+' / '+total;
  document.getElementById('v-fill').style.width=Math.round(vScore/total*100)+'%';
  document.getElementById('v-counter').textContent='QUESTION '+(vIdx+1)+' OF '+total;
  document.getElementById('v-word').textContent=q.w;
  document.getElementById('v-hint').textContent=q.h;
  const fb=document.getElementById('v-feedback');
  fb.style.display='none';
  document.getElementById('v-next').style.display='none';
  const choices=vShuffleChoices(q);
  const grid=document.getElementById('v-choices');
  grid.innerHTML='';
  choices.forEach((c)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c.text;
    btn.onclick=()=>vocabAnswer(c.isCorrect,btn,choices,q);
    grid.appendChild(btn);
  });
}

function vocabAnswer(isCorrect,el,choices,q){
  if(vAnswered)return;
  vAnswered=true;
  document.querySelectorAll('#v-choices .choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('v-feedback');
  if(isCorrect){
    el.classList.add('correct');vScore++;
    document.getElementById('v-score').textContent=vScore+' / '+PER_LEVEL;
    document.getElementById('v-fill').style.width=Math.round(vScore/PER_LEVEL*100)+'%';
    fb.textContent=rand(PRAISE);fb.className='feedback ok-fb';
  } else {
    el.classList.add('wrong');

function shadowNorm(s){return s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();}
function shadowSim(a,b){
  const wa=shadowNorm(a).split(' '),wb=shadowNorm(b).split(' ');
  let m=0;wb.forEach(w=>{if(wa.includes(w))m++;});
  const pr=wb.length?m/wb.length:0,rc=wa.length?m/wa.length:0;
  if(pr+rc===0)return 0;return 2*pr*rc/(pr+rc);
}

}

function shadowSetWave(on){for(let i=0;i<5;i++){const b=document.getElementById('sw'+i);if(b)b.classList.toggle('active',on);}}

function shadowToggleRec(){
  if(!srOK){
    const r=document.getElementById('s-result'),m=document.getElementById('s-result-msg');
    if(r&&m){m.textContent='⚠️ このブラウザは音声認識に対応していません。';r.className='shadow-result try';r.style.display='block';}
    return;
  }
  sIsRec?shadowStopRec():shadowStartRec();
}

function shadowStartRec(){
  sIsRec=true;
  const SRC=window.SpeechRecognition||window.webkitSpeechRecognition;
  sRecognition=new SRC();
  sRecognition.lang='en-US';sRecognition.interimResults=true;sRecognition.continuous=false;sRecognition.maxAlternatives=3;
  const mic=document.getElementById('s-mic'),ring=document.getElementById('s-ring'),lbl=document.getElementById('s-mic-lbl');
  const tb=document.getElementById('s-transcript'),rb=document.getElementById('s-result'),ar=document.getElementById('s-actions');
  if(mic)mic.classList.add('recording');if(ring)ring.classList.add('active');
  if(lbl){lbl.textContent='録音中… 話してください';lbl.classList.add('recording');}
  if(tb)tb.style.display='none';if(rb)rb.style.display='none';if(ar)ar.style.display='none';
  shadowSetWave(true);
  let finalText='';
  sRecognition.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    if(final)finalText=final;
    const t=document.getElementById('s-transcript');if(t){t.textContent='🎤 '+(finalText||interim);t.style.display='block';}
  };
  sRecognition.onend=()=>{
    sIsRec=false;shadowSetWave(false);
    const mic2=document.getElementById('s-mic'),ring2=document.getElementById('s-ring'),lbl2=document.getElementById('s-mic-lbl');
    if(mic2)mic2.classList.remove('recording');if(ring2)ring2.classList.remove('active');
    if(lbl2){lbl2.textContent='押して話す';lbl2.classList.remove('recording');}
    if(finalText)shadowEval(finalText);
    else{
      const rb2=document.getElementById('s-result'),rm=document.getElementById('s-result-msg'),ar2=document.getElementById('s-actions');
      if(rb2&&rm){rm.textContent='😅 音声が聞き取れませんでした。もう一度試してください。';rb2.className='shadow-result try';rb2.style.display='block';}
      if(ar2)ar2.style.display='flex';
    }
  };
  sRecognition.onerror=(e)=>{
    sIsRec=false;shadowSetWave(false);
    const mic3=document.getElementById('s-mic'),ring3=document.getElementById('s-ring'),lbl3=document.getElementById('s-mic-lbl');
    if(mic3)mic3.classList.remove('recording');if(ring3)ring3.classList.remove('active');
    if(lbl3){lbl3.textContent='押して話す';lbl3.classList.remove('recording');}
    const rb3=document.getElementById('s-result'),rm3=document.getElementById('s-result-msg'),ar3=document.getElementById('s-actions');
    const msg=e.error==='not-allowed'?'🔒 マイクのアクセスを許可してください。':'⚠️ 認識エラー。もう一度試してください。';
    if(rb3&&rm3){rm3.textContent=msg;rb3.className='shadow-result try';rb3.style.display='block';}
    if(ar3)ar3.style.display='flex';
  };
  try{sRecognition.start();}catch(e){sIsRec=false;shadowSetWave(false);}
}

function shadowStopRec(){if(sRecognition){try{sRecognition.stop();}catch(e){}}}

function shadowEval(spoken){
  const target=sPhrases[sIdx].en,score=shadowSim(target,spoken),pct=Math.round(score*100);
  const rb=document.getElementById('s-result'),rm=document.getElementById('s-result-msg'),md=document.getElementById('s-match'),ar=document.getElementById('s-actions');
  if(score>=0.75){
    sPerfects++;
    const ss=document.getElementById('s-score'),sf=document.getElementById('s-fill');
    if(ss)ss.textContent=sPerfects+' / '+sPhrases.length;
    if(sf)sf.style.width=Math.round(sPerfects/sPhrases.length*100)+'%';
    rm.textContent=rand(S_PERFECT);md.textContent='一致度 '+pct+'% — ほぼ完璧な発音です！';rb.className='shadow-result perfect';
    launchConfetti();
  } else if(score>=0.4){
    rm.textContent=rand(S_GOOD);md.textContent='一致度 '+pct+'% — もう少しで完璧！';rb.className='shadow-result good';
  } else {
    rm.textContent=rand(S_TRY);md.textContent='一致度 '+pct+'% — お手本をよく聞いてチャレンジ！';rb.className='shadow-result try';
  }
  rb.style.display='block';if(ar)ar.style.display='flex';
}

function shadowRetry(){
  const tb=document.getElementById('s-transcript'),rb=document.getElementById('s-result'),ar=document.getElementById('s-actions');
  if(tb)tb.style.display='none';if(rb)rb.style.display='none';if(ar)ar.style.display='none';
}

  if(sPerfects===total){emoji='🏆';title='パーフェクト！！';msg='全フレーズ完璧！あなたのビジネス英語は本物です。世界中の会議で活躍できます！';sLvl++;launchConfetti();}
  else if(sPerfects>=Math.ceil(total*0.6)){emoji='🌟';title='素晴らしい！';msg='すごい実力です！練習を続けてさらに磨きをかけよう。';}
  else{emoji='💪';title='ナイストライ！';msg='繰り返し声に出すことが上達の近道です！もう一度チャレンジしよう。';}
  document.getElementById('shadow-badge').textContent='LEVEL '+sLvl;
  document.getElementById('s-body').innerHTML=`
    <div class="result-screen">
      <span class="result-emoji">${emoji}</span>
      <div class="stars-row">
        <span class="star">${sPerfects>=3?'⭐':'☆'}</span>
        <span class="star">${sPerfects>=Math.ceil(total*0.6)?'⭐':'☆'}</span>
        <span class="star">${sPerfects===total?'⭐':'☆'}</span>
      </div>
      <p class="result-title">${title}</p>
      <p class="result-msg">${msg}</p>
      <div class="result-stat" style="background:var(--pur-l);color:var(--pur)"><i class="ti ti-microphone" aria-hidden="true"></i>${sPerfects} / ${total} フレーズ成功（${pct}%）</div>
      <button class="restart-btn" style="background:var(--pur)" onclick="shadowStart()">もう一度チャレンジ 🔄</button>
    </div>
  `;
}

shadowStart();
loadVoices();
</script>
</body>
</html>
