<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BizEnglish — ビジネス英語学習アプリ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#2563EB;--pri-l:#DBEAFE;
  --pur:#7C3AED;--pur-l:#EDE9FE;
  --acc:#F59E0B;--acc-l:#FEF3C7;
  --ok:#10B981;--ok-l:#D1FAE5;
  --ng:#EF4444;--ng-l:#FEE2E2;
  --bg:#F8FAFF;--card:#FFFFFF;--text:#1E293B;--muted:#64748B;--bdr:#E2E8F0;
  --tab-h:60px;--hdr-h:52px;
}

/* ── 画面全体を固定 ── */
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg)}
body{font-family:'Nunito',sans-serif;color:var(--text)}

#app{
  max-width:430px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  height:var(--hdr-h);
  padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.hdr-title{font-family:'Baloo 2',sans-serif;font-size:17px;font-weight:700;color:#FFF}
.hdr-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--acc);color:#78350F}

/* ── SCREEN WRAPPER ── */
/* 英単語・リスニングは固定、シャドーイングのみスクロール可 */
.screen{
  display:none;
  flex:1;
  overflow:hidden;
  padding:10px 14px;
  flex-direction:column;
}
.screen.active{display:flex}

/* シャドーイングだけスクロール許可 */
#screen-shadow{
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tab-h) + 16px);
}

/* ── TAB BAR ── */
.tab-bar{
  flex-shrink:0;
  height:var(--tab-h);
  background:var(--card);
  border-top:1px solid var(--bdr);
  display:flex;
  z-index:200;
}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .2s;border:none;background:none;padding:4px 0}
.tab-item .t-ico{font-size:20px;color:var(--muted);transition:all .2s;line-height:1}
.tab-item .t-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.tab-item.active .t-ico,.tab-item.active .t-lbl{color:var(--pri)}
#tab-shadow.active .t-ico,#tab-shadow.active .t-lbl{color:var(--pur)}
.tab-item.active .t-ico{transform:scale(1.12)}
.tab-indicator{position:absolute;top:-2px;height:3px;border-radius:0 0 3px 3px;width:33.33%;transition:left .3s cubic-bezier(.4,0,.2,1)}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.87)}to{opacity:1;transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pulseRing{0%{transform:scale(1);opacity:.8}70%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes waveBar{0%,100%{height:5px}50%{height:18px}}
@keyframes starPop{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(--card);border-radius:12px;border:1px solid var(--bdr);padding:10px 14px;margin-bottom:8px;flex-shrink:0}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:12px;font-weight:700}
.prog-score{font-size:12px;font-weight:700;color:var(--muted)}
.prog-bar{height:7px;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── COMMON ── */
.q-counter{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.feedback{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;text-align:center;animation:popIn .25s cubic-bezier(.4,0,.2,1);display:none;flex-shrink:0;margin-top:6px}
.feedback.ok-fb{background:var(--ok-l);color:#065F46;border:1.5px solid #34D399}
.feedback.ng-fb{background:var(--ng-l);color:#991B1B;border:1.5px solid #FCA5A5}
.action-btn{width:100%;padding:13px;color:#FFF;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;flex-shrink:0;margin-top:8px;display:none}
.action-btn:active{transform:scale(.97)}

/* ── RESULT MODAL ── */
.clear-modal{position:fixed;inset:0;background:rgba(30,41,59,.6);z-index:900;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.clear-card{background:var(--card);border-radius:22px;padding:28px 22px 22px;text-align:center;max-width:320px;width:100%;animation:popIn .3s cubic-bezier(.4,0,.2,1)}
.clear-emoji{font-size:48px;margin-bottom:10px;display:block}
.clear-title{font-family:'Baloo 2',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.clear-msg{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.clear-stats{display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:99px}
.nxt-lvl-btn{width:100%;padding:13px;color:#FFF;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
.stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:12px}
.star{font-size:26px;animation:starPop .4s ease both}
.star:nth-child(1){animation-delay:.1s}.star:nth-child(2){animation-delay:.25s}.star:nth-child(3){animation-delay:.4s}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* ══════════════════════════════════════
   VOCAB SCREEN
   ══════════════════════════════════════ */
#hdr-vocab{background:var(--pri)}
#screen-vocab .prog-lbl{color:var(--pri)}
#screen-vocab .prog-bar{background:var(--pri-l)}
#screen-vocab .prog-fill{background:var(--pri)}

.v-word-area{
  background:var(--card);border-radius:14px;border:1px solid var(--bdr);
  padding:14px 16px;margin-bottom:8px;text-align:center;flex-shrink:0;
}
.v-word{
  font-family:'Lora',Georgia,serif;font-size:32px;font-weight:700;font-style:italic;
  color:var(--pri);padding:8px 0 4px;letter-spacing:.5px;
}
.v-hint{font-size:13px;color:var(--muted);padding-bottom:4px}

/* 4択グリッド — flex:1 で余白を均等に使う */
.choices-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;flex:1;
}
.choice-btn{
  background:var(--bg);border:2px solid var(--bdr);border-radius:12px;
  padding:0 10px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .18s;text-align:center;line-height:1.3;
  display:flex;align-items:center;justify-content:center;
}
.choice-btn:active:not(:disabled){transform:scale(.97)}
.choice-btn.correct{background:var(--ok-l);border-color:var(--ok);color:#065F46}
.choice-btn.wrong{background:var(--ng-l);border-color:var(--ng);color:#991B1B;animation:shake .3s ease}
#v-next{background:var(--pri)}

/* ══════════════════════════════════════
   LISTEN SCREEN
   ══════════════════════════════════════ */
#hdr-listen{background:var(--pri);display:none}
#screen-listen .prog-lbl{color:var(--pri)}
#screen-listen .prog-bar{background:var(--pri-l)}
#screen-listen .prog-fill{background:var(--pri)}

.l-phrase-card{
  background:var(--card);border-radius:14px;border:1px solid var(--bdr);
  padding:12px 16px;margin-bottom:8px;text-align:center;flex-shrink:0;
}
.l-jp{font-family:'Baloo 2',sans-serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4}
.l-hint{font-size:12px;color:var(--muted);margin-bottom:10px}
.speak-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--pri);color:#FFF;border:none;border-radius:50px;
  padding:9px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:all .2s;
}
.speak-btn.playing{background:#0891B2}
.replay-wrap{margin-top:7px}
.replay-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:1.5px solid var(--bdr);border-radius:50px;
  padding:6px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;
}

/* 選択肢リスト — flex:1 で縦方向を均等に埋める */
.listen-choices{
  display:flex;flex-direction:column;
  gap:7px;flex:1;
}
.listen-choice{
  flex:1;
  background:var(--bg);border:2px solid var(--bdr);border-radius:11px;
  padding:0 14px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .18s;text-align:left;
  display:flex;align-items:center;line-height:1.4;
}
.listen-choice:active:not(:disabled){transform:translateX(2px)}
.listen-choice.correct{background:var(--ok-l);border-color:var(--ok);color:#065F46}
.listen-choice.wrong{background:var(--ng-l);border-color:var(--ng);color:#991B1B;animation:shake .3s ease}
.c-alpha{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  background:var(--bdr);color:var(--muted);
  font-family:'Lora',Georgia,serif;font-size:13px;font-weight:700;font-style:italic;
  margin-right:10px;flex-shrink:0;
}
.listen-choice.correct .c-alpha{background:var(--ok);color:#FFF}
.listen-choice.wrong .c-alpha{background:var(--ng);color:#FFF}
#l-next{background:var(--pri)}

/* ══════════════════════════════════════
   SHADOW SCREEN
   ══════════════════════════════════════ */
#hdr-shadow{background:var(--pur);display:none}
#screen-shadow .prog-lbl{color:var(--pur)}
#screen-shadow .prog-bar{background:var(--pur-l)}
#screen-shadow .prog-fill{background:var(--pur)}

.s-phrase-card{
  background:var(--card);border-radius:14px;border:1px solid var(--bdr);
  padding:12px 16px;margin-bottom:8px;text-align:center;flex-shrink:0;
}
.s-en{font-family:'Lora',Georgia,serif;font-size:15px;font-weight:600;font-style:italic;color:var(--pur);line-height:1.75;margin-bottom:4px}
.s-jp{font-size:13px;color:var(--muted);margin-bottom:10px}
.play-row{display:flex;align-items:center;justify-content:center;gap:8px}
.play-btn{display:inline-flex;align-items:center;gap:6px;background:var(--pri);color:#FFF;border:none;border-radius:50px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.play-btn.playing{background:#0891B2}
.slow-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:50px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
.slow-btn.active{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}

.mic-area{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.mic-outer{position:relative;display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px}
.mic-ring{position:absolute;inset:0;border-radius:50%;border:3px solid var(--pur);opacity:0}
.mic-ring.active{animation:pulseRing 1.2s ease-out infinite}
.mic-core{width:66px;height:66px;border-radius:50%;background:var(--pur);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;position:relative;z-index:1;transition:all .2s}
.mic-core.recording{background:#DC2626;animation:micPulse .6s ease infinite}
.mic-ico{font-size:28px;color:#FFF}
.wave-bars{display:flex;align-items:center;gap:3px;height:24px}
.wave-bar{width:3px;height:5px;background:var(--pur);border-radius:99px;opacity:.4}
.wave-bar.active{opacity:1;animation:waveBar .5s ease infinite}
.wave-bar:nth-child(1){animation-delay:0s}.wave-bar:nth-child(2){animation-delay:.1s}
.wave-bar:nth-child(3){animation-delay:.2s}.wave-bar:nth-child(4){animation-delay:.1s}
.wave-bar:nth-child(5){animation-delay:0s}
.mic-lbl{font-size:12px;font-weight:700;color:var(--muted)}
.mic-lbl.recording{color:#DC2626}

.transcript-box{background:var(--pur-l);border:1.5px solid #C4B5FD;border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;color:#4C1D95;text-align:center;display:none;flex-shrink:0;margin-top:4px}
.shadow-result{border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;text-align:center;animation:popIn .25s ease;display:none;flex-shrink:0;margin-top:4px}
.shadow-result.perfect{background:var(--ok-l);color:#065F46;border:1.5px solid #34D399;font-size:14px}
.shadow-result.good{background:var(--pri-l);color:#1E3A8A;border:1.5px solid #93C5FD}
.shadow-result.try-fb{background:var(--ng-l);color:#991B1B;border:1.5px solid #FCA5A5}
.match-detail{font-size:11px;font-weight:600;opacity:.8;margin-top:3px}
.s-action-row{display:flex;gap:8px;flex-shrink:0;margin-top:8px}
.retry-btn{flex:1;padding:12px;background:var(--bg);color:var(--pur);border:2px solid var(--pur);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.shadow-next-btn{flex:1;padding:12px;background:var(--pur);color:#FFF;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}

/* ── RESULT SCREEN (inline, スクロールなし) ── */
.result-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:1rem;gap:6px;
}
.result-emoji{font-size:56px;line-height:1}
.result-title{font-family:'Baloo 2',sans-serif;font-size:24px;font-weight:700;color:var(--text)}
.result-msg{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px}
.result-stat{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:800;padding:9px 18px;border-radius:999px}
.restart-btn{padding:13px 0;color:#FFF;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;width:100%;max-width:280px}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="app">

  <!-- HEADERS -->
  <div class="hdr" id="hdr-vocab" style="background:var(--pri)">
    <span class="hdr-title">🌟 BizEnglish</span>
    <span class="hdr-badge" id="vocab-badge">LEVEL 1</span>
  </div>
  <div class="hdr" id="hdr-listen" style="background:var(--pri);display:none">
    <span class="hdr-title">🎧 リスニング</span>
    <span class="hdr-badge" id="listen-badge">LEVEL 1</span>
  </div>
  <div class="hdr" id="hdr-shadow" style="background:var(--pur);display:none">
    <span class="hdr-title">🗣️ シャドーイング</span>
    <span class="hdr-badge" id="shadow-badge">LEVEL 1</span>
  </div>

  <!-- ===== VOCAB SCREEN ===== -->
  <div class="screen active" id="screen-vocab">
    <!-- progress -->
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="v-lv-text">Level 1 — ビジネス初級</span>
        <span class="prog-score" id="v-score">0 / 10</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="v-fill" style="width:0%"></div></div>
    </div>
    <!-- word card -->
    <div class="v-word-area">
      <div class="q-counter" id="v-counter">QUESTION 1 OF 10</div>
      <div class="v-word" id="v-word">meeting</div>
      <div class="v-hint" id="v-hint">この単語の意味は？</div>
    </div>
    <!-- 4 choices fills remaining height -->
    <div class="choices-grid" id="v-choices"></div>
    <!-- feedback + next appear below choices -->
    <div class="feedback" id="v-feedback"></div>
    <button class="action-btn" id="v-next" style="background:var(--pri)">次の問題へ →</button>
  </div>

  <!-- ===== LISTEN SCREEN ===== -->
  <div class="screen" id="screen-listen">
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="l-lv-text" style="color:var(--pri)">Level 1 — リスニング</span>
        <span class="prog-score" id="l-score">0 / 10</span>
      </div>
      <div class="prog-bar" style="background:var(--pri-l)"><div class="prog-fill" id="l-fill" style="width:0%;background:var(--pri)"></div></div>
    </div>
    <div class="l-phrase-card">
      <div class="q-counter" id="l-counter">QUESTION 1 OF 10</div>
      <div class="l-jp" id="l-jp">—</div>
      <div class="l-hint">🔊 音声を聞いて正しい英文を選ぼう</div>
      <button class="speak-btn" id="l-play-btn" onclick="listenPlay()">
        <i class="ti ti-volume" style="font-size:15px"></i>音声を再生
      </button>
      <div class="replay-wrap">
        <button class="replay-btn" id="l-replay-btn" style="display:none" onclick="listenPlay()">
          <i class="ti ti-refresh" style="font-size:13px"></i>もう一度聞く
        </button>
      </div>
    </div>
    <!-- choices fill remaining height -->
    <div class="listen-choices" id="l-choices"></div>
    <div class="feedback" id="l-feedback"></div>
    <button class="action-btn" id="l-next" style="background:var(--pri)">次の問題へ →</button>
  </div>

  <!-- ===== SHADOW SCREEN ===== -->
  <div class="screen" id="screen-shadow">
    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="s-lv-text" style="color:var(--pur)">Level 1 — シャドーイング</span>
        <span class="prog-score" id="s-score">0 / 8</span>
      </div>
      <div class="prog-bar" style="background:var(--pur-l)"><div class="prog-fill" id="s-fill" style="width:0%;background:var(--pur)"></div></div>
    </div>
    <div class="s-phrase-card">
      <div class="q-counter" id="s-counter">PHRASE 1 OF 8</div>
      <div class="s-en" id="s-en">—</div>
      <div class="s-jp" id="s-jp">—</div>
      <div class="play-row">
        <button class="play-btn" id="s-play-btn" onclick="shadowPlay()">
          <i class="ti ti-player-play" style="font-size:14px"></i>お手本を聞く
        </button>
        <button class="slow-btn" id="s-slow-btn" onclick="shadowToggleSlow()">
          <i class="ti ti-clock" style="font-size:13px"></i>ゆっくり
        </button>
      </div>
    </div>
    <!-- mic area fills remaining height -->
    <div class="mic-area">
      <div class="mic-outer">
        <div class="mic-ring" id="s-ring"></div>
        <button class="mic-core" id="s-mic" onclick="shadowToggleRec()">
          <i class="ti ti-microphone mic-ico"></i>
        </button>
      </div>
      <div class="wave-bars">
        <div class="wave-bar" id="sw0"></div><div class="wave-bar" id="sw1"></div>
        <div class="wave-bar" id="sw2"></div><div class="wave-bar" id="sw3"></div>
        <div class="wave-bar" id="sw4"></div>
      </div>
      <span class="mic-lbl" id="s-mic-lbl">押して話す</span>
    </div>
    <div class="transcript-box" id="s-transcript"></div>
    <div class="shadow-result" id="s-result">
      <div id="s-result-msg"></div>
      <div class="match-detail" id="s-match"></div>
    </div>
    <div class="s-action-row" id="s-actions" style="display:none">
      <button class="retry-btn" onclick="shadowRetry()">もう一度 🔄</button>
      <button class="shadow-next-btn" onclick="shadowNext()">次へ →</button>
    </div>
  </div>

  <!-- TAB BAR -->
  <nav class="tab-bar" style="position:relative">
    <div class="tab-indicator" id="tab-ind" style="left:0;background:var(--pri)"></div>
    <button class="tab-item active" id="tab-vocab" onclick="switchTab('vocab')">
      <i class="ti ti-books t-ico"></i><span class="t-lbl">英単語</span>
    </button>

<script>
/* ── SHARED ── */
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rand(a){return a[Math.floor(Math.random()*a.length)];}

let sVoices=[];
function loadVoices(){
  if(!window.speechSynthesis)return;
  sVoices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(!sVoices.length)speechSynthesis.addEventListener('voiceschanged',()=>{sVoices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));});
}
function speak(text,rate,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate||0.85;u.pitch=1;
  const v=sVoices.find(x=>x.lang==='en-US'&&x.name.includes('Google'))||sVoices.find(x=>x.lang==='en-US')||sVoices[0];
  if(v)u.voice=v;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}

function launchConfetti(){
  const cv=document.getElementById('confetti-canvas'),ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#2563EB','#F59E0B','#10B981','#EF4444','#7C3AED','#EC4899','#06B6D4'];
  const p=Array.from({length:120},()=>({x:Math.random()*cv.width,y:-10-Math.random()*180,size:5+Math.random()*7,color:rand(cols),speed:3+Math.random()*4,angle:Math.random()*360,spin:(Math.random()-.5)*6,drift:(Math.random()-.5)*2,opacity:1,shape:Math.random()>.5?'rect':'circle'}));
  let f=0;(function draw(){ctx.clearRect(0,0,cv.width,cv.height);p.forEach(q=>{ctx.save();ctx.globalAlpha=q.opacity;ctx.translate(q.x,q.y);ctx.rotate(q.angle*Math.PI/180);ctx.fillStyle=q.color;if(q.shape==='rect')ctx.fillRect(-q.size/2,-q.size/4,q.size,q.size/2);else{ctx.beginPath();ctx.arc(0,0,q.size/2,0,Math.PI*2);ctx.fill();}ctx.restore();q.y+=q.speed;q.x+=q.drift;q.angle+=q.spin;if(f>80)q.opacity-=0.012;});f++;if(f<160)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();
}

/* ── TAB SWITCHING ── */
function switchTab(tab){
  ['vocab','listen','shadow'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('screen-'+t).classList.toggle('active',t===tab);
    document.getElementById('hdr-'+t).style.display=t===tab?'flex':'none';
  });
  const i={vocab:0,listen:1,shadow:2}[tab];
  const ind=document.getElementById('tab-ind');
  ind.style.left=i*33.33+'%';
  ind.style.background=tab==='shadow'?'var(--pur)':'var(--pri)';
}

function vShufChoices(q){const it=q.c.map((t,i)=>({t,ok:i===q.a}));for(let i=it.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[it[i],it[j]]=[it[j],it[i]];}return it;}

function vocabInit(){vShuf=shuffle(VOCAB_ALL);vLvl=1;vIdx=0;vScore=0;vocabRender();}
function vocabRender(){
  vAnswered=false;
  const q=vGetQ(),tot=PER_LV;
  document.getElementById('vocab-badge').textContent='LEVEL '+vLvl;
  document.getElementById('v-lv-text').textContent='Level '+vLvl+' — '+vLvlName();
  document.getElementById('v-score').textContent=vScore+' / '+tot;
  document.getElementById('v-fill').style.width=Math.round(vScore/tot*100)+'%';
  document.getElementById('v-counter').textContent='QUESTION '+(vIdx+1)+' OF '+tot;
  document.getElementById('v-word').textContent=q.w;
  document.getElementById('v-hint').textContent=q.h;
  const fb=document.getElementById('v-feedback');fb.style.display='none';
  const nb=document.getElementById('v-next');nb.style.display='none';
  const choices=vShufChoices(q);
  const grid=document.getElementById('v-choices');grid.innerHTML='';
  choices.forEach(ch=>{
    const b=document.createElement('button');b.className='choice-btn';b.textContent=ch.t;
    b.onclick=()=>vocabAnswer(ch.ok,b,choices);grid.appendChild(b);
  });
}
function vocabAnswer(ok,el,choices){
  if(vAnswered)return;vAnswered=true;
  document.querySelectorAll('#v-choices .choice-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('v-feedback'),nb=document.getElementById('v-next');
  if(ok){
    el.classList.add('correct');vScore++;
    document.getElementById('v-score').textContent=vScore+' / '+PER_LV;
    document.getElementById('v-fill').style.width=Math.round(vScore/PER_LV*100)+'%';
    fb.textContent=rand(PRAISE);fb.className='feedback ok-fb';
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('#v-choices .choice-btn').forEach(b=>{if(choices.find(c=>c.t===b.textContent&&c.ok))b.classList.add('correct');});
    fb.innerHTML='😅 惜しい！正解は「'+choices.find(c=>c.ok).t+'」です。';fb.className='feedback ng-fb';
  }
  fb.style.display='block';nb.style.display='block';
  const isLast=vIdx===PER_LV-1;
  nb.textContent=isLast?'ステージ完了！🎊':'次の問題へ →';
  nb.onclick=isLast?vocabClear:()=>{vIdx++;vocabRender();};
}
function vocabClear(){
  document.getElementById('vc-emoji').textContent=rand(['🎉','🏆','🚀','🌟','🥇']);
  document.getElementById('vc-title').textContent='Level '+vLvl+' クリア！';
  document.getElementById('vc-msg').textContent=rand(CLEAR_MSGS);
  document.getElementById('vc-score-pill').textContent='正解 '+vScore+'/'+PER_LV;
  document.getElementById('vc-lv-pill').textContent='LEVEL '+vLvl;
  document.getElementById('vocab-clear').style.display='flex';
  launchConfetti();
}
function vocabNextLevel(){
  document.getElementById('vocab-clear').style.display='none';
  vLvl++;vIdx=0;vScore=0;vocabRender();
}
vocabInit();

const L_PRAISE=["🎉 Brilliant! Perfect listening!","🌟 Outstanding! You got it!","🏆 Excellent! Sharp ears!","💪 Fantastic! You're on fire!","🚀 Amazing! Keep it up!","✨ Perfect! You're a star!","🎯 Spot on! Incredible!","🥳 Wonderful! You nailed it!"];
const ALPHAS=['A','B','C','D'];
let lShuf=[],lIdx=0,lScore=0,lAnswered=false,lLvl=1,lCurQ=null;

function listenStart(){lShuf=shuffle(LISTEN_Q).slice(0,10);lIdx=0;lScore=0;listenRender();}
function listenRender(){
  lAnswered=false;lCurQ=lShuf[lIdx];
  const tot=lShuf.length;
  document.getElementById('listen-badge').textContent='LEVEL '+lLvl;
  document.getElementById('l-lv-text').textContent='Level '+lLvl+' — リスニング';
  document.getElementById('l-score').textContent=lScore+' / '+tot;
  document.getElementById('l-fill').style.width=Math.round(lScore/tot*100)+'%';
  document.getElementById('l-counter').textContent='QUESTION '+(lIdx+1)+' OF '+tot;
  document.getElementById('l-jp').textContent=lCurQ.jp;
  const pb=document.getElementById('l-play-btn');
  pb.classList.remove('playing');pb.innerHTML='<i class="ti ti-volume" style="font-size:15px"></i>音声を再生';
  document.getElementById('l-replay-btn').style.display='none';
  const fb=document.getElementById('l-feedback');fb.style.display='none';
  const nb=document.getElementById('l-next');nb.style.display='none';
  const choices=shuffle([lCurQ.en,...lCurQ.w]);
  const grid=document.getElementById('l-choices');grid.innerHTML='';
  choices.forEach((c,i)=>{
    const b=document.createElement('button');b.className='listen-choice';
    b.dataset.correct=String(c===lCurQ.en);
    b.innerHTML=`<span class="c-alpha">${ALPHAS[i]}</span>${c}`;
    b.onclick=()=>listenAnswer(b,choices);
    grid.appendChild(b);
  });
  setTimeout(()=>listenPlay(),400);
}
function listenPlay(){
  const pb=document.getElementById('l-play-btn');
  if(pb){pb.classList.add('playing');pb.innerHTML='<i class="ti ti-volume" style="font-size:15px"></i>再生中...';}
  speak(lCurQ.en,0.85,()=>{
    const b=document.getElementById('l-play-btn');
    if(b){b.classList.remove('playing');b.innerHTML='<i class="ti ti-volume" style="font-size:15px"></i>音声を再生';}
    const r=document.getElementById('l-replay-btn');if(r)r.style.display='inline-flex';
  });
}
function listenAnswer(el,choices){
  if(lAnswered)return;lAnswered=true;
  document.querySelectorAll('.listen-choice').forEach(b=>b.disabled=true);
  const isOk=el.dataset.correct==='true';
  const fb=document.getElementById('l-feedback'),nb=document.getElementById('l-next');
  if(isOk){
    el.classList.add('correct');lScore++;
    document.getElementById('l-score').textContent=lScore+' / '+lShuf.length;
    document.getElementById('l-fill').style.width=Math.round(lScore/lShuf.length*100)+'%';
    fb.textContent=rand(L_PRAISE);fb.className='feedback ok-fb';
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.listen-choice').forEach(b=>{if(b.dataset.correct==='true')b.classList.add('correct');});
    fb.innerHTML='😅 惜しい！正解: <strong style="color:#065F46">'+lCurQ.en+'</strong>';fb.className='feedback ng-fb';
  }
  fb.style.display='block';nb.style.display='block';
  const isLast=lIdx===lShuf.length-1;
  nb.textContent=isLast?'結果を見る 🎊':'次の問題へ →';
  nb.onclick=isLast?listenResult:()=>{lIdx++;listenRender();};
}
function listenResult(){
  const tot=lShuf.length,pct=Math.round(lScore/tot*100);
  let emoji,title,msg;
  if(lScore===tot){emoji='🏆';title='パーフェクト！！';msg='全問正解！あなたはビジネス英語リスニングマスターです！';lLvl++;launchConfetti();}
  else if(lScore>=Math.ceil(tot*0.6)){emoji='🌟';title='よくできました！';msg='かなりの実力です！もう少しで満点に届きますよ。';}
  else{emoji='💪';title='ナイストライ！';msg:'まだまだこれから！繰り返し聞いて耳を鍛えよう。';}
  document.getElementById('listen-badge').textContent='LEVEL '+lLvl;
  // result画面をflex列で表示
  const scr=document.getElementById('screen-listen');
  scr.innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="stars-row">
        <span class="star">${lScore>=4?'⭐':'☆'}</span>
        <span class="star">${lScore>=7?'⭐':'☆'}</span>
        <span class="star">${lScore>=10?'⭐':'☆'}</span>
      </div>
      <p class="result-title">${title}</p>
      <p class="result-msg">${msg}</p>
      <div class="result-stat" style="background:var(--pri-l);color:var(--pri)">🎧 ${lScore} / ${tot} 正解（${pct}%）</div>
      <button class="restart-btn" style="background:var(--pri)" onclick="listenRestart()">もう一度チャレンジ 🔄</button>
    </div>
  `;
}
function listenRestart(){

  const scr=document.getElementById('screen-listen');

    <div class="prog-wrap">
      <div class="prog-row">
        <span class="prog-lbl" id="l-lv-text" style="color:var(--pri)">Level 1 — リスニング</span>

      <div class="l-jp" id="l-jp">—</div>
      <div class="l-hint">🔊 音声を聞いて正しい英文を選ぼう</div>
      <button class="speak-btn" id="l-play-btn" onclick="listenPlay()">
        <i class="ti ti-volume" style="font-size:15px"></i>音声を再生
      </button>
      <div class="replay-wrap">
        <button class="replay-btn" id="l-replay-btn" style="display:none" onclick="listenPlay()">

    <button class="action-btn" id="l-next" style="background:var(--pri)">次の問題へ →</button>
  `;
  listenStart();
}

  {

  {

  {

  {

    jp:"チームのモチベーションアップ",

    title:"Setting Expectations",

  },
  {
    title:"Cross-Department Collaboration",
    jp:"部門間連携",
    en:"One of the challenges we've been hearing from both teams is that communication between product and engineering isn't as smooth as it could be. I'd like to propose a few changes to improve this. First, let's establish a weekly sync between the two teams every Monday morning. Second, I'd like to create a shared project tracking board so that both sides have visibility into priorities and progress. Third, whenever there's a major feature request, it should be discussed jointly before it's added to the roadmap. I believe these steps will reduce friction significantly."

  {

    en:"Hi, this is Rachel from the customer success team. I'm checking in to see how things are going with your account. Have you had a chance to explore the new reporting features we released last month? I think they might be particularly useful for your use case. Also, I noticed that your team's usage has dropped slightly over the past few weeks, and I wanted to make sure everything is running smoothly. Is there anything you're finding difficult or any features you're not sure how to use? I'm here to help make sure you're getting the most out of the platform."

  {
    title:"Closing a Sales Deal",

    en:"It's been a pleasure working with you over these past few weeks. I believe we've addressed all your key concerns, and I'm confident our solution is the right fit for your team. I'd like to move forward and finalize the agreement. I'll have our legal team send over the contract today. The implementation team is ready to start as soon as the paperwork is signed, and we're targeting a go-live date of the first of next month. Is there anything else you need from our side before you're ready to sign?"

  {
    title:"Mentoring Session",
    jp:"メンタリングセッション",
    en:"I'm glad we could find time for this. Mentoring is something I feel strongly about, because having a good mentor earlier in my career made a huge difference for me. Today I'd like to start by hearing from you — what are your main goals for the next twelve months, and what do you feel are the biggest obstacles in your way? From there, we can think together about how to address those challenges and make a concrete plan. These sessions work best when they're driven by your agenda, so please speak openly."
  },
  {
    title:"Town Hall Meeting",
    jp:"タウンホールミーティング",
    en:"Thank you all for being here today for our company-wide town hall. I want to start by acknowledging that this has been a challenging year for everyone, and I'm incredibly grateful for the resilience and dedication you've all shown. I'd like to use today's session to share our company results, outline our priorities for the coming year, and most importantly, answer your questions. There are no off-limit topics — this is a space for honest dialogue. Let's start with the year in review."

  {
    title:"Introducing Process Improvement",

    en:"After reviewing the feedback from last quarter's project, it's clear that we need to improve our internal processes, particularly around handoffs between teams. Currently, a lot of time is being lost when work moves from one team to another because expectations aren't clearly set. I'm proposing that we adopt a simple handoff checklist. It would include a summary of the work completed, any open issues, the next steps, and the responsible owner. It's a small change but I believe it will make a significant difference in our efficiency."
  },
  {
    title:"Onsite Client Visit",
    jp:"クライアント訪問",
    en:"Welcome, and thank you so much for making the trip to visit us today. We're really excited to have you here in person. I've arranged for you to meet some of the key people working on your account. We'll start with a tour of our development center, then have lunch with the team, and finish with a strategy session in the afternoon. I want today to be as useful for you as possible, so please let me know if there's anything specific you'd like to see or discuss. Shall we get started?"

    jp:"誤解の解消",

  },
  {
    title:"Annual Planning Session",

  {
    title:"Discussing Career Development",
    jp:"キャリア開発の話し合い",
    en:"I'd like to talk about your career development and where you'd like to be in the next few years. You've been doing excellent work, and I want to make sure we're supporting your growth in the right direction. Are you interested in deepening your technical expertise, or is leadership something that appeals to you? I ask because the paths are quite different, and the opportunities we create for you should align with your goals. There's no wrong answer — what matters most is that we're intentional about your development."
  },
  {
    title:"Presenting a Business Case",
    jp:"ビジネスケースのプレゼン",
    en:"I'd like to present a business case for investing in a new CRM system. Our current system is over eight years old and lacks several capabilities that are now standard in the industry. The limitations are affecting our sales team's productivity and our ability to track customer interactions effectively. I've evaluated three options at different price points. The recommended option requires an upfront investment of two hundred thousand dollars and a monthly subscription of three thousand dollars. Based on our projections, we expect to see a return on investment within eighteen months through improved conversion rates and reduced admin time."
  },
  {
    title:"Change Management Communication",
    jp:"変革管理のコミュニケーション",
    en:"I know there have been a lot of questions about the upcoming changes to our workflow system. I want to address them head on. Yes, we are moving to a new platform in February, and yes, it will require some adjustment. But here's why I believe this change is worth it: the new system will save each team member an average of one hour per day on administrative tasks. That's five hours per week that you can redirect to the work that actually matters. We'll have training sessions throughout January, and there will be dedicated support available for the first month after launch."
  },
  {
    title:"Discussing Market Expansion",
    jp:"市場拡大の議論",
    en:"I'd like to open a discussion about our international expansion strategy. Currently, ninety percent of our revenue comes from North America. While that market remains strong, we're seeing signs of saturation in some of our core segments. Europe and particularly the UK represent a natural first step for international expansion, given the language and regulatory similarities. We've been in conversations with two potential distribution partners in London. Before we go further, I'd like the team's input on the risks and opportunities we should be weighing."
  },
  {
    title:"Product Roadmap Review",

  {
    title:"Welcoming a New Client",
    jp:"新規クライアントの歓迎",
    en:"On behalf of everyone at the company, I'd like to officially welcome you as our newest client. We're truly excited about this partnership and committed to delivering exceptional results for your team. Over the next few weeks, you'll be working closely with your dedicated account manager, who will guide you through the setup process and make sure you have everything you need to get started. We've also scheduled a kickoff call for next week to align on goals and timelines. Please don't hesitate to reach out at any time — we're here to support you."
  },
  {
    title:"Running a Retrospective",

  {

  {

  {
    title:"Product Launch Announcement",

    en:"I'm thrilled to announce that we'll be officially launching our new platform, Atlas, on the fifteenth of next month. This has been two years in the making, and I couldn't be prouder of the team that built it. Atlas addresses the core challenges our customers have been telling us about: fragmented data, slow reporting, and poor integration with existing tools. We've already signed up fifty beta users, and the feedback has been overwhelmingly positive. In the lead-up to launch, we'll be running a media campaign and hosting a live webinar. I'll share the full marketing plan with you all by end of week."

  {

  {
    title:"Discussing Automation",

  {

  {

  {

  {

  {

const S_PERFECT=["🏆 あなたの発音は完璧です！ネイティブ並みの素晴らしさ！","🌟 Absolutely PERFECT! あなたの発音に脱帽です！","🚀 パーフェクト！もはやあなたはビジネス英語の達人！","✨ 完璧すぎる発音！世界中のオフィスで通じます！","🎯 Outstanding! これは天才的な発音です！"];
const S_GOOD=["👍 かなり惜しい！もう少しで完璧！","💪 Good job! あと少しで完璧な発音です！","🔥 Almost there! 練習あるのみ、ファイト！"];
const S_TRY=["😊 ナイストライ！もう一度お手本を聞いてから発音してみよう！","💡 練習が光を生む！繰り返しチャレンジしよう！","🎵 リズムに乗ってもう一度！きっとうまくいく！"];

/* セット管理 */
let sPool=[];          // 現在の100問プール
let sCompleted=[];     // 完了済みインデックス（poolに対して）
let sPhrs=[];          // 現在セットの10問
let sSetNum=1;         // 何セット目か（10問単位）
let sAllSetsDone=false;// 100問完了フラグ
let sIdx=0,sPerfects=0,sSlowMode=false,sLvl=1,sIsRec=false,sRec=null;
let sGenerating=false; // AI生成中フラグ
const srOK=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
const S_PER_SET=10;

function shadowNorm(s){return s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();}
function shadowSim(a,b){
  const wa=shadowNorm(a).split(' '),wb=shadowNorm(b).split(' ');
  let m=0;wb.forEach(w=>{if(wa.includes(w))m++;});
  const pr=wb.length?m/wb.length:0,rc=wa.length?m/wa.length:0;
  if(pr+rc===0)return 0;return 2*pr*rc/(pr+rc);
}

/* 初回起動 */
function shadowInit(){
  sPool=shuffle([...SHADOW_ALL]);
  sCompleted=[];sSetNum=1;sAllSetsDone=false;
  shadowStartSet();
}

/* 10問セット開始 */
function shadowStartSet(){
  const start=(sSetNum-1)*S_PER_SET;
  sPhrs=sPool.slice(start, start+S_PER_SET);
  sIdx=0;sPerfects=0;
  shadowRender();
}

function shadowRender(){
  const p=sPhrs[sIdx],tot=sPhrs.length;
  const globalNum=(sSetNum-1)*S_PER_SET+sIdx+1;
  const totalPool=sPool.length;
  document.getElementById('shadow-badge').textContent='LEVEL '+sLvl;
  document.getElementById('s-lv-text').textContent='Level '+sLvl+' — シャドーイング';
  document.getElementById('s-score').textContent=sPerfects+' / '+tot;
  document.getElementById('s-fill').style.width=Math.round(sPerfects/tot*100)+'%';
  document.getElementById('s-counter').textContent='STORY '+globalNum+' / '+totalPool;
  document.getElementById('s-en').textContent=p.en;
  document.getElementById('s-jp').textContent='📌 '+p.title+'　|　'+p.jp;
  const pb=document.getElementById('s-play-btn');
  pb.classList.remove('playing');pb.innerHTML='<i class="ti ti-player-play" style="font-size:14px"></i>お手本を聞く';
  const sb=document.getElementById('s-slow-btn');
  sb.classList.toggle('active',sSlowMode);
  sb.innerHTML=`<i class="ti ti-clock" style="font-size:13px"></i>${sSlowMode?'スロー中':'ゆっくり'}`;
  const mic=document.getElementById('s-mic'),ring=document.getElementById('s-ring'),lbl=document.getElementById('s-mic-lbl');
  mic.classList.remove('recording');ring.classList.remove('active');
  lbl.textContent='押して話す';lbl.classList.remove('recording');
  shadowSetWave(false);
  const tb=document.getElementById('s-transcript'),rb=document.getElementById('s-result'),ar=document.getElementById('s-actions');
  tb.style.display='none';rb.style.display='none';ar.style.display='none';
  setTimeout(()=>shadowPlay(),500);
}

function shadowPlay(){
  const btn=document.getElementById('s-play-btn');
  if(btn){btn.classList.add('playing');btn.innerHTML='<i class="ti ti-volume" style="font-size:14px"></i>再生中...';}
  speak(sPhrs[sIdx].en,sSlowMode?0.55:0.82,()=>{
    const b=document.getElementById('s-play-btn');
    if(b){b.classList.remove('playing');b.innerHTML='<i class="ti ti-player-play" style="font-size:14px"></i>お手本を聞く';}
  });
}

function shadowToggleSlow(){
  sSlowMode=!sSlowMode;
  const sb=document.getElementById('s-slow-btn');
  sb.classList.toggle('active',sSlowMode);
  sb.innerHTML=`<i class="ti ti-clock" style="font-size:13px"></i>${sSlowMode?'スロー中':'ゆっくり'}`;
}

function shadowSetWave(on){for(let i=0;i<5;i++){const b=document.getElementById('sw'+i);if(b)b.classList.toggle('active',on);}}

function shadowToggleRec(){
  if(!srOK){
    const rb=document.getElementById('s-result'),rm=document.getElementById('s-result-msg'),ar=document.getElementById('s-actions');
    rm.textContent='⚠️ このブラウザは音声認識に対応していません（Chromeをお使いください）。';
    rb.className='shadow-result try-fb';rb.style.display='block';ar.style.display='flex';return;
  }
  sIsRec?shadowStopRec():shadowStartRec();
}

function shadowStartRec(){
  sIsRec=true;
  const SRC=window.SpeechRecognition||window.webkitSpeechRecognition;
  sRec=new SRC();sRec.lang='en-US';sRec.interimResults=true;sRec.continuous=false;sRec.maxAlternatives=3;
  const mic=document.getElementById('s-mic'),ring=document.getElementById('s-ring'),lbl=document.getElementById('s-mic-lbl');
  const tb=document.getElementById('s-transcript'),rb=document.getElementById('s-result'),ar=document.getElementById('s-actions');
  mic.classList.add('recording');ring.classList.add('active');
  lbl.textContent='録音中… 話してください';lbl.classList.add('recording');
  tb.style.display='none';rb.style.display='none';ar.style.display='none';
  shadowSetWave(true);
  let finalText='';
  sRec.onresult=e=>{
    let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    if(fin)finalText=fin;
    const t=document.getElementById('s-transcript');
    if(t){t.textContent='🎤 '+(finalText||interim);t.style.display='block';}
  };
  sRec.onend=()=>{
    sIsRec=false;shadowSetWave(false);
    const m=document.getElementById('s-mic'),r=document.getElementById('s-ring'),l=document.getElementById('s-mic-lbl');
    m.classList.remove('recording');r.classList.remove('active');l.textContent='押して話す';l.classList.remove('recording');
    if(finalText)shadowEval(finalText);
    else{
      const rb2=document.getElementById('s-result'),rm=document.getElementById('s-result-msg'),ar2=document.getElementById('s-actions');
      rm.textContent='😅 音声が聞き取れませんでした。もう一度試してください。';
      rb2.className='shadow-result try-fb';rb2.style.display='block';ar2.style.display='flex';
    }
  };
  sRec.onerror=e=>{
    sIsRec=false;shadowSetWave(false);
    const m=document.getElementById('s-mic'),r=document.getElementById('s-ring'),l=document.getElementById('s-mic-lbl');
    m.classList.remove('recording');r.classList.remove('active');l.textContent='押して話す';l.classList.remove('recording');
    const rb3=document.getElementById('s-result'),rm3=document.getElementById('s-result-msg'),ar3=document.getElementById('s-actions');
    rm3.textContent=e.error==='not-allowed'?'🔒 マイクのアクセスを許可してください。':'⚠️ 認識エラー。もう一度試してください。';
    rb3.className='shadow-result try-fb';rb3.style.display='block';ar3.style.display='flex';
  };
  try{sRec.start();}catch(e){sIsRec=false;shadowSetWave(false);}
}

function shadowStopRec(){if(sRec){try{sRec.stop();}catch(e){}}}

function shadowEval(spoken){
  const target=sPhrs[sIdx].en,sc=shadowSim(target,spoken),pct=Math.round(sc*100);
  const rb=document.getElementById('s-result'),rm=document.getElementById('s-result-msg'),md=document.getElementById('s-match'),ar=document.getElementById('s-actions');
  if(sc>=0.75){
    sPerfects++;
    document.getElementById('s-score').textContent=sPerfects+' / '+sPhrs.length;
    document.getElementById('s-fill').style.width=Math.round(sPerfects/sPhrs.length*100)+'%';
    rm.textContent=rand(S_PERFECT);md.textContent='一致度 '+pct+'% — ほぼ完璧な発音です！';rb.className='shadow-result perfect';
    launchConfetti();
  } else if(sc>=0.4){
    rm.textContent=rand(S_GOOD);md.textContent='一致度 '+pct+'% — もう少しで完璧！';rb.className='shadow-result good';
  } else {
    rm.textContent=rand(S_TRY);md.textContent='一致度 '+pct+'% — お手本をよく聞いてチャレンジ！';rb.className='shadow-result try-fb';
  }
  rb.style.display='block';ar.style.display='flex';
}

function shadowRetry(){
  const tb=document.getElementById('s-transcript'),rb=document.getElementById('s-result'),ar=document.getElementById('s-actions');
  tb.style.display='none';rb.style.display='none';ar.style.display='none';
}

function shadowNext(){
  if(sIdx===sPhrs.length-1){
    shadowSetResult();
  } else {
    sIdx++;shadowRender();
  }
}

/* 10問セット完了 */
function shadowSetResult(){
  const tot=sPhrs.length,pct=Math.round(sPerfects/tot*100);
  const globalDone=sSetNum*S_PER_SET;
  const totalPool=sPool.length;
  const isAllDone=globalDone>=totalPool;

  let emoji,title,msg,btnLabel,btnFn;
  if(sPerfects===tot){emoji='🏆';title='セット'+sSetNum+' パーフェクト！！';sLvl++;launchConfetti();}
  else if(sPerfects>=Math.ceil(tot*0.6)){emoji='🌟';title='セット'+sSetNum+' クリア！';}
  else{emoji='💪';title='セット'+sSetNum+' 完了！';}
  msg=`${sPerfects} / ${tot} 成功（${pct}%）　全体進捗: ${globalDone} / ${totalPool} ストーリー`;

  if(isAllDone){
    btnLabel='🤖 AIで新しい100問を生成！';
    btnFn='shadowGenerateNew()';
  } else {
    btnLabel='次の10問へ 🚀 ('+( globalDone+1 )+'〜'+(Math.min(globalDone+S_PER_SET,totalPool))+'問目)';
    btnFn='shadowNextSet()';
  }

  document.getElementById('shadow-badge').textContent='LEVEL '+sLvl;
  document.getElementById('screen-shadow').innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="stars-row">
        <span class="star">${sPerfects>=4?'⭐':'☆'}</span>
        <span class="star">${sPerfects>=7?'⭐':'☆'}</span>
        <span class="star">${sPerfects===10?'⭐':'☆'}</span>
      </div>
      <p class="result-title">${title}</p>
      <p class="result-msg" style="font-size:12px;margin-bottom:8px">${msg}</p>
      ${isAllDone?`<p class="result-msg" style="color:var(--pur);font-weight:800;font-size:13px">🎉 全100問完了！AIが新しい100問を生成します！</p>`:''}
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px;margin-top:8px">
        <button class="restart-btn" style="background:var(--pur)" onclick="${btnFn}">${btnLabel}</button>
        <button class="restart-btn" style="background:var(--bg);color:var(--pur);border:2px solid var(--pur)" onclick="shadowRestartPool()">最初からやり直す 🔄</button>
      </div>
    </div>
  `;
}

/* 次の10問セット */
function shadowNextSet(){
  sSetNum++;
  shadowRebuildScreen();
  shadowStartSet();
}

/* AI生成で新100問 */

  document.getElementById('screen-shadow').innerHTML=`
    <div class="result-screen">
      <div class="result-emoji" style="font-size:48px">🤖</div>
      <p class="result-title" style="margin-bottom:8px">AI生成中...</p>

        <div id="gen-bar" style="height:100%;background:var(--pur);border-radius:99px;width:0%;transition:width .5s"></div>
      </div>
      <p id="gen-status" style="font-size:12px;color:var(--muted);margin-top:8px">接続中...</p>
    </div>
  `;

  // プログレスバーアニメーション
  let prog=0;
  const progTimer=setInterval(()=>{
    prog=Math.min(prog+Math.random()*3,90);
    const bar=document.getElementById('gen-bar');
    const st=document.getElementById('gen-status');
    if(bar)bar.style.width=prog+'%';
    if(st){
      if(prog<20)st.textContent='ストーリーのテーマを考えています...';
      else if(prog<40)st.textContent='英文を作成しています...';
      else if(prog<60)st.textContent='日本語タイトルを付けています...';
      else if(prog<80)st.textContent='ビジネス表現を最適化中...';
      else st.textContent='もうすぐ完成！';
    }
  },400);

  try{
    const prompt=`You are a business English teacher. Generate exactly 20 unique business conversation short stories for shadowing practice. Each story should be 8-12 sentences long (about 1-2 minutes to read aloud) and cover different business scenarios.

Return ONLY a valid JSON array. No markdown, no backticks, no explanation. Format:
[{"title":"Short English Title","jp":"日本語タイトル","en":"The full story text here."},...]

Topics to cover (use all 20, one each):
1. Job interview 2. Sales presentation 3. Board meeting 4. Team conflict 5. Product demo 6. Contract signing 7. Business trip planning 8. Customer escalation 9. Merger announcement 10. Startup funding pitch 11. Performance improvement plan 12. New market entry 13. Technology adoption 14. Supplier negotiation 15. Marketing campaign review 16. Legal compliance briefing 17. Cross-functional project 18. Executive coaching 19. Company acquisition 20. Employee recognition

Make each story natural, conversational business English.`;

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:8000,
        messages:[{role:'user',content:prompt}]
      })
    });

    const data=await resp.json();
    let text=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');
    text=text.replace(/```json|```/g,'').trim();
    const newStories=JSON.parse(text);

    clearInterval(progTimer);
    const bar=document.getElementById('gen-bar');if(bar)bar.style.width='100%';
    const st=document.getElementById('gen-status');if(st)st.textContent='完成！';

    // 新プールにセット（既存100問 + 新生成）
    setTimeout(()=>{
      sPool=shuffle([...SHADOW_ALL,...newStories]);
      sCompleted=[];sSetNum=1;sAllSetsDone=false;sLvl++;sGenerating=false;
      document.getElementById('shadow-badge').textContent='LEVEL '+sLvl;
      shadowRebuildScreen();
      shadowStartSet();
    },800);

  } catch(err){
    clearInterval(progTimer);
    // API失敗時はオリジナル100問をシャッフルして再スタート
    document.getElementById('screen-shadow').innerHTML=`
      <div class="result-screen">
        <div class="result-emoji">⚠️</div>
        <p class="result-title">生成に失敗しました</p>
        <p class="result-msg">ネットワーク接続を確認してください。<br>元の100問でリスタートします。</p>
        <button class="restart-btn" style="background:var(--pur);max-width:260px;margin-top:12px" onclick="shadowRestartPool()">元の100問で再スタート 🔄</button>
      </div>
    `;
    sGenerating=false;
  }
}

/* プール最初からやり直し */
function shadowRestartPool(){
  sPool=shuffle([...SHADOW_ALL]);
  sCompleted=[];sSetNum=1;sAllSetsDone=false;
  shadowRebuildScreen();
  shadowStartSet();
}

    </div>
    <div class="s-phrase-card">
      <div class="q-counter" id="s-counter">STORY 1 / 100</div>
      <div class="s-en" id="s-en">—</div>
      <div class="s-jp" id="s-jp">—</div>
      <div class="play-row">
        <button class="play-btn" id="s-play-btn" onclick="shadowPlay()">
          <i class="ti ti-player-play" style="font-size:14px"></i>お手本を聞く
        </button>
        <button class="slow-btn" id="s-slow-btn" onclick="shadowToggleSlow()">
          <i class="ti ti-clock" style="font-size:13px"></i>ゆっくり

      </div>
    </div>
    <div class="mic-area">

      <div class="wave-bars">

    </div>
  `;
}


shadowInit();
loadVoices();
</script>
